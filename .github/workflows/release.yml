# Release workflow (adr-0017, wired at MS-5 as planned): pushing a version tag
# builds the distribution and publishes a GitHub Release with the artifacts
# attached. PyPI publishing is deliberately out of scope (adr-0017). Additive
# workflow — not part of the standard-owned check.yml twin (conventions #8).
name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # setup-uv reads .python-version itself; it has no python-version-file
      # input (the v1.0.0 run warned on and ignored one).
      - uses: astral-sh/setup-uv@v7

      - name: Build sdist + wheel
        run: uv build

      - name: Smoke-test the built wheel
        run: |
          uv run --isolated --no-project --with dist/*.whl docmend --version

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "docmend $GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes
