# Release workflow (adr-0017, wired at MS-5 as planned): pushing a version tag
# builds the distribution and publishes a GitHub Release with the artifacts
# attached. PyPI publishing is deliberately out of scope (adr-0017). Additive
# workflow — not part of the standard-owned check.yml twin (conventions #8).
name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # setup-uv reads .python-version itself; it has no python-version-file
      # input (the v1.0.0 run warned on and ignored one).
      # SHA-pinned like check.yml: this job publishes artifacts with
      # `contents: write`, so it must be at least as supply-chain hardened
      # as the check job (first-party actions/* stay on tags, same as there).
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - name: Build sdist + wheel
        run: uv build

      - name: Smoke-test the built wheel
        run: |
          uv run --isolated --no-project --with dist/*.whl docmend --version

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "docmend $GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes
