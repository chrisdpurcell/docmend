name: Dependency Review

# OSS license-compliance gate (adr-0017; ported from hw-radar, allowlist
# tightened for a DISTRIBUTED tool). GitHub's dependency graph resolves uv.lock
# natively (incl. license metadata), so this action enforces the allowlist
# below on every PR with zero added Python deps. Enforces spec §16 / §8.6.
#
# PR-triggered ONLY — a dependency added by a direct-to-branch commit bypasses
# it; run a manual licensecheck pass for those (spec §16). The action tolerates
# undetectable/UNKNOWN licenses rather than hard-failing (a large fraction of
# PyPI packages lack machine-readable license metadata — PEP 639).
#
# Divergence from hw-radar: no (L)GPL entries and no per-package exemptions.
# hw-radar allowed LGPL (psycopg) on the rationale that it distributes nothing,
# so LGPL/GPL obligations never trigger. docmend is a distributed CLI (uv tool
# install / tagged release), so a copyleft dependency is a real obligation and
# must be a deliberate, per-package decision when it first appears — not a
# silent pre-approval. Add the SPDX id or a purl exemption here at that point,
# recording the reasoning in the same PR.

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/dependency-review-action@v5
        with:
          # SPDX ids — permissive / public-domain-class licenses only.
          # CC0-1.0 / MIT-0 / HPND / 0BSD / Unlicense are permissive transitive
          # licenses common under MIT/BSD projects. MPL-2.0 is file-level
          # copyleft with no obligation for merely importing the package.
          allow-licenses: >-
            MIT, BSD-2-Clause, BSD-3-Clause, Apache-2.0, ISC, Python-2.0, PSF-2.0, 0BSD, Unlicense, MPL-2.0, CC0-1.0, MIT-0, HPND


          # rfc3987-syntax (via jsonschema[format-nongpl], spec §8.6/OQ-018):
          # GitHub's scanner reports "Apache-2.0 AND GPL-1.0-or-later AND MIT",
          # but the distributed package is MIT — verified 2026-07-06 against the
          # installed dist: LICENSE file is MIT, METADATA License-Expression is
          # MIT, and no file in the wheel carries a GPL header (the expression
          # stems from a stale "Apache Software License" classifier + repo-level
          # scanning). Rationale recorded in docs/dependency-licenses.md.
          allow-dependencies-licenses: pkg:pypi/rfc3987-syntax
