[project_standards]
schema_version = "1.0"
catalog = "5"

# require_sections stays false: docmend keeps ADRs consistent by convention (authored
# from docs/adr/adr.template.md), and deliberately does not adopt Markdown Frontmatter
# (ADR-0001), so MADR-section enforcement is intentionally not imposed.
[standards.adr]
enabled = true
version = "latest"
config = { contract_version = "1.0", require_sections = false }

[standards.agent-handoff]
enabled = true
version = "latest"
config = { contract_version = "1.0", harnesses = ["claude-code", "codex"], startup = "automatic" }

[standards.markdown-tooling]
enabled = true
version = "latest"
config = { contract_version = "1.1", markdownlint_config_ownership = "consumer-owned" }

[standards.project-spec]
enabled = true
version = "latest"
config = { include_patterns = ["docs/specs/**/*.md"], reference_prefixes = ["DMR"], workflow_ownership = "consumer-owned" }

[standards.python-tooling]
enabled = true
version = "latest"
config = { additional_dev_dependencies = ["allpairspy>=2.5.1", "faker==40.28.1", "hypothesis>=6.156.1", "import-linter>=2.13", "pyfakefs>=6.2.0", "pytest-xdist>=3.8.0"], contract_version = "1.0", workflow_ownership = "consumer-owned" }
